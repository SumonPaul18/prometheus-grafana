global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '192.168.0.245:9100'   # main Docker host
          - '192.168.0.93:9100'    # UbuntuDesktop1
          - '192.168.0.38:9100'    # k3s node

  - job_name: 'cadvisor'
    scrape_timeout: 10s 
    static_configs:
      - targets:
          - '192.168.0.245:8080'

